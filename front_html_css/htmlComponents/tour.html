<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tour</title>
    <link rel="stylesheet" href="../cssComponents/tour.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="main_container">
      <p class="header">
        Small-Group Antelope Canyon & Horseshoe Bend Tour <br />
        from Las Vegas
      </p>

      <!-- two button section -->
      <div class="fetbtn">
        <button>Featured</button>
        <button>Best Seller</button>
      </div>

      <!-- title section -->

      <div class="headtext">
        <!-- left side div -->
        <div class="left_text">
          <p>(2467 reviews)</p>
          <ul>
            <li>Las Vegas, United States</li>
            <li>1.5k booked</li>
          </ul>
        </div>
        <!-- right side div -->
        <div class="right_item">
          <i class="fa-solid fa-share-nodes fa-lg"></i><span>Share</span>
        </div>
      </div>

      <!-- Image section  -->
      <div class="image">
        <img class="bannerImage" src="../images/details-05.png" alt="" />
        <div class="subimage">
          <img src="../images/details-06.png" alt="" />
          <img src="../images/details-07.png" alt="" />
        </div>
        </div>

        <!-- main div -->
        <div class="text">
            <!-- left side div  -->
            <div class="left_side_div">
                <!-- icon section  -->
                <div class="icon_div">
                    <div class="icon"><i class="fa-solid fa-person fa-xl"></i> <span>Duration: 1 NIGHT</span></div>
                    <div class="icon"><i class="fa-solid fa-globe"></i> <span>Language: English</span></div>
                    <div class="icon"><i class="fa-solid fa-dollar-sign"></i> <span>Tour type: Rail Tour, Tour & Cruise</span></div>
                </div>
                <!-- text section  -->
                <div></div>
            </div>
            <!-- right side div -->
            <div class="right_div">

            </div>
        </div>
      
    </div>
  </body>
</html>
