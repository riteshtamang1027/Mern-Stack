<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card</title>
    <link rel="stylesheet" href="index.css" />
     <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  </head>
  <body>
    <!-- nav bar secton -->
    <nav class="navbar">
      <div class="logo">TechShop</div>
      <div class="list">
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Cart</a>

      </div>
    </nav>

    <!-- main container -->
    <div class="main_container">


      <!-- Image and text container -->
      <div class="card_container">
        <!-- image container -->
        <img class="image" src="https://images.unsplash.com/photo-1502920917128-1aa500764cbd?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8Y2FtZXJhfGVufDB8fDB8fHww" alt="" />
       
        <!-- description section -->
        <div class="description">

    <div class="text_section">
            <!-- title -->
            <h2 class="title">Premium Headphones</h2>

            <p class="price">$199.00</p>

            <!-- list -->
            <ul class="listed">
                <li>40hr battery</li>
                <li>Noise cancle</li>
                <li>Wireless</li>
            </ul>
    </div>


<!-- <div class="btn_div"> -->
  
            <button class="btn">Buy Now</button>


<!-- </div> -->
        </div>
      </div>

      <!-- text section  -->
      <div class="secon_card">
        <p class="spec_tex">Specification Table</p>
        <p class="feature">
          <span>Color: Black</span>|<span>Weight: 250g</span>|<span>Battery: 40hr</span>
        </p>
      </div>
      <!-- last  -->
      <div>
        <p class="last_card">Have question? <i class="fa-regular fa-envelope"></i> <span class="contact">Contact form</span></p>
      </div>

    </div>
  </body>
</html>
