<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechShop - Headphones</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav>
      <div class="logo">TechShop</div>
      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Cart</a>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
      <!-- Product Section -->
      <div class="product-section">
        <!-- Image -->
        <div class="product-image-box">
          <svg
            class="camera-svg"
            viewBox="0 0 80 65"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect x="5" y="18" width="70" height="42" rx="4" fill="#555" />
            <circle cx="40" cy="39" r="14" fill="#888" />
            <circle cx="40" cy="39" r="9" fill="#bbb" />
            <rect x="28" y="12" width="18" height="8" rx="2" fill="#555" />
            <rect x="60" y="22" width="10" height="6" rx="2" fill="#888" />
          </svg>
        </div>

        <!-- Info -->
        <div class="product-info">
          <div class="product-title">Premium Headphones</div>
          <div class="product-price">$199.00</div>
          <ul class="product-features">
            <li>40hr battery</li>
            <li>Noise cancel</li>
            <li>Wireless</li>
          </ul>
          <button class="btn-buy">Buy Now</button>
        </div>
      </div>

      <!-- Specifications -->
      <div class="specs-section">
        <div class="specs-title">Specifications Table</div>
        <div class="specs-row">
          <span>Color: Black</span>
          <span>Weight: 250g</span>
          <span>Battery: 40hr</span>
        </div>
      </div>

      <!-- Contact -->
      <div class="contact-section">
        <span class="question">Have questions?</span>
        <span class="envelope-icon">✉</span>
        <a href="#" class="contact-link">Contact form</a>
      </div>
    </div>
  </body>
</html>
