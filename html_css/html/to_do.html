<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* body{
            width: 60vw;
        } */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-around;
      }
      .tast-insert-div {
        padding: 8px 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
      }
      .insert-task {
        padding: 16px;
        border-radius: 16px;
        font-size: 16px;
        border: 1px solid rgb(180, 179, 179);
        outline: rgb(41, 50, 234);
        width: 24vw;
      }
      .add-task {
        padding: 12px;
        border-radius: 12px;
        font-size: 16px;
        cursor: pointer;
        border: 1px solid rgb(180, 179, 179);
      }
      .list_of_task {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        /* gap: 8px; */
      }
      .list_ckeck {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0px 4px;
      }
      .list_ckeck .checked {
        width: 16px;
        height: 16px;
        cursor: pointer;
      }
      .list_ckeck .task {
        font-size: 20px;
        padding: 0;
        margin: 0;
      }
      /* .list_of_task .time{
       

       } */
    </style>
  </head>
  <body>
    <header class="header">
      <h2>TASK FLOW</h2>
      <span id="display-date"></span>
    </header>

    <div class="tast-insert-div">
      <input
        class="insert-task"
        type="text"
        id="task"
        placeholder="Add a Task..."
      />
      <button class="add-task" onclick="addNewTask()">Add Task</button>
    </div>

    <div id="taskList" class="list_of_task">

      <div>
        <div class="list_ckeck">
          <input class="checked" type="checkbox" />
          <p class="task">something</p>
        </div>
        <span class="time">time</span>
      </div>
      
    </div>

    <script src="../htmljs/to_do.js"></script>
  </body>
</html>
